name: Sync LeetCode solutions (cloud)

# Cloud runs LeetCode ONLY -- Codeforces needs your local solutions folder,
# which GitHub's hosted runner cannot see. Run the orchestrator locally via
# cron for Codeforces (see README).

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Configure git author
        run: |
          git config user.name "streak-bot"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
      - name: Run orchestrator (LeetCode only)
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: python orchestrator.py --platforms leetcode
